# Render Blueprint for AI LMS with Proctoring System
# This file defines all services needed for deployment

services:
  # Node.js Backend API
  - type: web
    name: ai-lms-backend
    runtime: node
    region: oregon
    plan: free  # Change to 'starter' for better performance
    buildCommand: cd backend && npm install
    startCommand: cd backend && node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
      - key: MONGODB_URI
        sync: false  # Set in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: EMAIL
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_SECRET
        sync: false
      - key: CLOUDINARY_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://ai-lms-frontend.onrender.com  # Update with your frontend URL
      - key: YOLO_SERVICE_URL
        value: https://ai-lms-yolo.onrender.com  # Update with your YOLO service URL
    healthCheckPath: /
    
  # Python YOLO Proctoring Service
  - type: web
    name: ai-lms-yolo
    runtime: python
    region: oregon
    plan: free  # WARNING: May be slow on free tier, consider 'starter' plan
    buildCommand: cd backend/ai_proctoring && pip install -r requirements.txt
    startCommand: cd backend/ai_proctoring && python yolo_detector.py
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: 5001
    healthCheckPath: /health
    
  # React Frontend (Static Site)
  - type: web
    name: ai-lms-frontend
    runtime: static
    region: oregon
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://ai-lms-backend.onrender.com  # Update with your backend URL
      - key: VITE_RAZORPAY_KEY_ID
        sync: false  # Set in Render dashboard

# Note: You'll need to update the service URLs above with your actual Render URLs after first deployment
